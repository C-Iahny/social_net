<script type="text/javascript">

function createOrReturnPrivateChat(id){
    var formData = new FormData();
    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');
    formData.append('user2_id', id);
    fetch("{% url 'chat:create-or-return-private-chat' %}", {
        method: 'POST',
        body: formData,
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
        if(data['response'] == "Successfully got the chat."){
            OnGetOrCreateChatroomSuccess(data['chatroom_id']);
        } else if(data['response'] != null){
            alert(data['response']);
        }
    })
    .catch(function(err){
        console.error("createOrReturnPrivateChat error:", err);
        alert("Something went wrong.");
    });
}

function OnGetOrCreateChatroomSuccess(chatroomId){
    var url = "{% url 'chat:private-chat-room' %}?room_id=" + chatroomId;
    window.location.replace(url);
}

</script>
