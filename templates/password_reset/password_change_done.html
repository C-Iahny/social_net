{% extends 'base.html' %}
{% load static %}
{% load i18n %}

{% block content %}
<style>
.auth-page{min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;background:var(--bg);}
.auth-card{width:100%;max-width:420px;background:var(--bg-card);border:1px solid var(--border);border-radius:22px;box-shadow:0 12px 48px rgba(0,0,0,.12);padding:2.5rem 2.25rem 2rem;font-family:var(--font-primary,'Space Grotesk',sans-serif);animation:fadeInUp .4s ease both;text-align:center;}
[data-theme="dark"] .auth-card{background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-color:var(--glass-border);box-shadow:0 12px 48px rgba(0,0,0,.6),0 0 0 1px rgba(0,207,255,.06),inset 0 1px 0 rgba(255,255,255,.04);}
.auth-brand{display:flex;align-items:center;justify-content:center;margin-bottom:1.75rem;text-decoration:none!important;}
.auth-brand-logo{height:72px;width:72px;border-radius:16px;object-fit:cover;filter:drop-shadow(0 3px 12px var(--accent-glow,rgba(99,102,241,.25)));}
.auth-icon-big{font-size:3.5rem;margin-bottom:.75rem;}
.auth-heading{font-size:1.45rem;font-weight:800;color:var(--text);margin-bottom:.5rem;letter-spacing:-.03em;}
[data-theme="dark"] .auth-heading{background:linear-gradient(135deg,#fff 40%,rgba(0,207,255,.7) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.auth-body{font-size:.9rem;color:var(--text-muted);line-height:1.6;margin-bottom:1.5rem;}
.auth-btn{display:inline-block;padding:.85rem 2.25rem;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;border:none;border-radius:12px;font-size:.97rem;font-weight:700;cursor:pointer;text-decoration:none;transition:opacity .2s,transform .15s;box-shadow:0 4px 18px var(--accent-glow);}
[data-theme="dark"] .auth-btn{color:#000;}
.auth-btn:hover{opacity:.9;transform:translateY(-1px);color:#fff;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
</style>

<div class="auth-page">
    <div class="auth-card">

        <a href="{% url 'landing' %}" class="auth-brand">
            <img src="{% static 'logo/Vazi_logo003.jpeg' %}" alt="VAZIMBA" class="auth-brand-logo"
                 onerror="this.style.display='none'">
        </a>

        <div class="auth-icon-big">✅</div>
        <h1 class="auth-heading">{% trans "Password updated!" %}</h1>
        <p class="auth-body">{% trans "Your password has been changed successfully." %}</p>

        <a href="{% url 'home' %}" class="auth-btn">{% trans "Back to feed" %}</a>
    </div>
</div>
{% endblock %}
