<style type="text/css">
{% load static %}

/* ============================================================
   ZOOT DESIGN SYSTEM — SYNTHWAVE DARK / AURORA LIGHT
   Typographie : Space Grotesk
   ============================================================ */

/* ── POLICE GLOBALE ── */
:root {
    --font-primary: 'Space Grotesk', 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    --font-mono:    'Space Mono', 'Fira Code', monospace;
}

/* ── PALETTE AURORA (mode clair) ── */
:root {
    --bg:           #f0eef8;
    --bg-card:      #ffffff;
    --bg-nav:       rgba(255,255,255,0.92);
    --bg-hover:     #ece9f7;
    --text:         #1a1535;
    --text-muted:   #6b6590;
    --border:       #ddd9f0;
    --accent:       #6366f1;
    --accent2:      #a855f7;
    --accent3:      #ec4899;
    --accent-dark:  #4f46e5;
    --accent-glow:  rgba(99,102,241,0.18);
    --shadow:       0 1px 4px rgba(80,60,160,.07), 0 6px 24px rgba(80,60,160,.09);
    --shadow-lg:    0 8px 40px rgba(80,60,160,.14);
    --input-bg:     #f5f3fe;
    --dropdown-bg:  #ffffff;
    --btn-bg:       #ece9f7;
    --btn-hover:    #ddd9f0;
    --neon-cyan:    #6366f1;
    --neon-purple:  #a855f7;
    --neon-pink:    #ec4899;
    --glass-bg:     rgba(255,255,255,0.72);
    --glass-border: rgba(99,102,241,0.18);

    /* compat legacy */
    --main-background-color:    #f0eef8;
    --dark-background-color:    #ddd9f0;
    --secondary-text-color:     #6b6590;
    --light-primary-text-color: #6366f1;
    --main-radius: 12px;
    --main-padding: 8px;
}

/* ── PALETTE SYNTHWAVE (mode sombre) ── */
[data-theme="dark"] {
    --bg:           #07080f;
    --bg-card:      #0d0f1e;
    --bg-nav:       rgba(8,9,18,0.94);
    --bg-hover:     #111328;
    --text:         #dde2f0;
    --text-muted:   #6878a0;
    --border:       #1a2240;
    --accent:       #00cfff;
    --accent2:      #bf5fff;
    --accent3:      #ff4da6;
    --accent-dark:  #00b8e0;
    --accent-glow:  rgba(0,207,255,0.15);
    --shadow:       0 2px 8px rgba(0,0,0,.6), 0 8px 32px rgba(0,207,255,.04);
    --shadow-lg:    0 12px 48px rgba(0,0,0,.7), 0 0 40px rgba(0,207,255,.06);
    --input-bg:     #0a0c1a;
    --dropdown-bg:  #0d0f1e;
    --btn-bg:       #111328;
    --btn-hover:    #161830;
    --neon-cyan:    #00cfff;
    --neon-purple:  #bf5fff;
    --neon-pink:    #ff4da6;
    --glass-bg:     rgba(13,15,30,0.82);
    --glass-border: rgba(0,207,255,0.14);

    --main-background-color:    #0d0f1e;
    --dark-background-color:    #07080f;
    --secondary-text-color:     #6878a0;
    --light-primary-text-color: #00cfff;
}

/* ============================================================
   BASE
   ============================================================ */
html {
    transition: background .35s, color .35s;
    scroll-behavior: smooth;
}

body {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-primary);
    font-weight: 400;
    transition: background .35s, color .35s;
    line-height: 1.6;
}

/* Grille cyberpunk uniquement en dark mode */
[data-theme="dark"] body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
        linear-gradient(rgba(0,207,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,207,255,.025) 1px, transparent 1px);
    background-size: 48px 48px;
}
[data-theme="dark"] body > * { position: relative; z-index: 1; }

/* Lueur de fond subtile en dark mode */
[data-theme="dark"] body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(191,95,255,.06) 0%, transparent 70%);
    top: -200px; right: -200px;
    pointer-events: none;
    z-index: 0;
}

footer {
    font-family: var(--font-primary);
    background: var(--bg-card);
    color: var(--text-muted);
    border-top: 1px solid var(--border);
}

* { box-sizing: border-box; }

/* ============================================================
   TYPOGRAPHIE
   ============================================================ */
h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-primary);
    font-weight: 700;
    letter-spacing: -.02em;
}

code, pre {
    font-family: var(--font-mono);
}

/* ============================================================
   SCROLLBAR CUSTOM
   ============================================================ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 6px;
}
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ============================================================
   GLASSMORPHISM UTILITY
   ============================================================ */
.glass {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
}

/* ============================================================
   NEON GLOW UTILITIES (dark mode uniquement)
   ============================================================ */
[data-theme="dark"] .neon-cyan  { color: var(--neon-cyan);   text-shadow: 0 0 8px rgba(0,207,255,.7); }
[data-theme="dark"] .neon-purple{ color: var(--neon-purple);  text-shadow: 0 0 8px rgba(191,95,255,.7); }
[data-theme="dark"] .neon-pink  { color: var(--neon-pink);    text-shadow: 0 0 8px rgba(255,77,166,.7); }

[data-theme="dark"] .neon-border-cyan   { border-color: var(--neon-cyan)   !important; box-shadow: 0 0 12px rgba(0,207,255,.3); }
[data-theme="dark"] .neon-border-purple { border-color: var(--neon-purple)  !important; box-shadow: 0 0 12px rgba(191,95,255,.3); }

/* ============================================================
   CARDS
   ============================================================ */
.card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--main-radius, 12px);
    box-shadow: var(--shadow);
    transition: box-shadow .25s, border-color .25s, transform .2s;
}
.card:hover {
    box-shadow: var(--shadow-lg);
}
[data-theme="dark"] .card:hover {
    border-color: rgba(0,207,255,.2);
    box-shadow: var(--shadow-lg), 0 0 20px rgba(0,207,255,.06);
}
.card-body {
    background: var(--bg-card);
    color: var(--text);
}

/* ============================================================
   BOOTSTRAP DARK OVERRIDES
   ============================================================ */
[data-theme="dark"] .bg-white { background-color: var(--bg-card) !important; }
[data-theme="dark"] .bg-light { background-color: var(--btn-bg) !important; }
[data-theme="dark"] .text-dark { color: var(--text) !important; }
[data-theme="dark"] .text-muted { color: var(--text-muted) !important; }

[data-theme="dark"] .border,
[data-theme="dark"] .border-bottom,
[data-theme="dark"] .border-top,
[data-theme="dark"] .border-left,
[data-theme="dark"] .border-right { border-color: var(--border) !important; }

[data-theme="dark"] .dropdown-menu {
    background-color: var(--dropdown-bg);
    border-color: var(--border);
}
[data-theme="dark"] .dropdown-item { color: var(--text); }
[data-theme="dark"] .dropdown-item:hover,
[data-theme="dark"] .dropdown-item:focus {
    background-color: var(--btn-bg);
    color: var(--accent);
}

[data-theme="dark"] .form-control {
    background-color: var(--input-bg);
    color: var(--text);
    border-color: var(--border);
    border-radius: 10px;
    transition: border-color .2s, box-shadow .2s;
}
[data-theme="dark"] .form-control::placeholder { color: var(--text-muted); }
[data-theme="dark"] .form-control:focus {
    background-color: var(--input-bg);
    color: var(--text);
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
}

[data-theme="dark"] .btn-outline-primary {
    color: var(--accent);
    border-color: var(--accent);
}
[data-theme="dark"] .btn-outline-primary:hover {
    background: var(--accent);
    color: #000;
}
[data-theme="dark"] .btn-light {
    background: var(--btn-bg);
    color: var(--text);
    border-color: var(--border);
}
[data-theme="dark"] .btn-secondary {
    background: var(--btn-bg);
    border-color: var(--border);
    color: var(--text);
}

[data-theme="dark"] .modal-content {
    background: var(--bg-card);
    color: var(--text);
    border-color: var(--border);
    border-radius: 16px;
}
[data-theme="dark"] .modal-header,
[data-theme="dark"] .modal-footer { border-color: var(--border); }

[data-theme="dark"] .table { color: var(--text); }
[data-theme="dark"] .table-striped tbody tr:nth-of-type(odd) { background-color: rgba(255,255,255,.02); }
[data-theme="dark"] .table-hover tbody tr:hover { background-color: rgba(0,207,255,.04); }

[data-theme="dark"] .list-group-item {
    background: var(--bg-card);
    color: var(--text);
    border-color: var(--border);
}

[data-theme="dark"] .nav-tabs .nav-link { color: var(--text-muted); }
[data-theme="dark"] .nav-tabs .nav-link.active {
    background: var(--bg-card);
    color: var(--accent);
    border-color: var(--border) var(--border) var(--bg-card);
}

[data-theme="dark"] hr { border-color: var(--border); }

[data-theme="dark"] a { color: var(--accent); }
[data-theme="dark"] a:hover { color: var(--accent-dark); }

[data-theme="dark"] .spinner-border { color: var(--accent) !important; }

/* ============================================================
   INPUTS GLOBAUX
   ============================================================ */
input:not([type="submit"]):not([type="button"]):not([type="checkbox"]):not([type="radio"]),
textarea, select {
    font-family: var(--font-primary);
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    transition: border-color .2s, box-shadow .2s;
}
input:not([type="submit"]):not([type="button"]):not([type="checkbox"]):not([type="radio"]):focus,
textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    outline: none;
}

[data-theme="dark"] input:not([type="submit"]):not([type="button"]):not([type="checkbox"]):not([type="radio"]),
[data-theme="dark"] textarea,
[data-theme="dark"] select {
    background-color: var(--input-bg) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
}
[data-theme="dark"] input:not([type="submit"]):not([type="button"]):not([type="checkbox"]):not([type="radio"]):focus,
[data-theme="dark"] textarea:focus,
[data-theme="dark"] select:focus {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px var(--accent-glow) !important;
}

/* ============================================================
   BADGES / ALERTS
   ============================================================ */
[data-theme="dark"] .alert-info    { background: #0d1a33; color: #00cfff; border-color: #0a2040; }
[data-theme="dark"] .alert-success { background: #0a1f14; color: #00ffaa; border-color: #0d2a1a; }
[data-theme="dark"] .alert-warning { background: #1f1500; color: #ffd700; border-color: #2a1d00; }
[data-theme="dark"] .alert-danger  { background: #1f0a14; color: #ff4da6; border-color: #2a0d1a; }

/* ============================================================
   PAGINATION
   ============================================================ */
[data-theme="dark"] .page-link {
    background: var(--bg-card);
    color: var(--accent);
    border-color: var(--border);
}
[data-theme="dark"] .page-item.active .page-link {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
}
[data-theme="dark"] .page-item.disabled .page-link {
    background: var(--bg-card);
    color: var(--text-muted);
    border-color: var(--border);
}

/* ============================================================
   OMBRES
   ============================================================ */
[data-theme="dark"] .shadow,
[data-theme="dark"] .shadow-sm,
[data-theme="dark"] .shadow-lg { box-shadow: var(--shadow) !important; }

/* ============================================================
   FOOTER
   ============================================================ */
[data-theme="dark"] #pied {
    background-color: var(--bg-card) !important;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
}

/* ============================================================
   CHAT
   ============================================================ */
[data-theme="dark"] .chat-log {
    background-color: var(--bg-card) !important;
    color: var(--text);
    border-color: var(--border) !important;
}
[data-theme="dark"] .chat-message-input { border-color: var(--border) !important; }
[data-theme="dark"] .chat-message-input input,
[data-theme="dark"] .chat-message-input textarea {
    background: var(--input-bg);
    color: var(--text);
    border-color: var(--border);
}

/* ============================================================
   NOTIFICATIONS
   ============================================================ */
[data-theme="dark"] .general-card:hover,
[data-theme="dark"] .chat-card:hover {
    background: var(--btn-bg) !important;
}

/* ============================================================
   COMPTE / PROFIL
   ============================================================ */
[data-theme="dark"] #username {
    background-color: rgba(0,0,0,.65) !important;
    color: #fff !important;
}
[data-theme="dark"] .card#personal_infos,
[data-theme="dark"] #post_bar,
[data-theme="dark"] .card {
    background-color: var(--bg-card) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
}
[data-theme="dark"] #menu_btn {
    background-color: var(--btn-bg) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
}
[data-theme="dark"] #menu_btn:hover {
    background-color: var(--accent) !important;
    color: #000 !important;
}
[data-theme="dark"] #post_btn {
    background-color: var(--accent) !important;
    color: #000 !important;
}
[data-theme="dark"] .footer.bg-white,
[data-theme="dark"] #footer_account {
    background-color: var(--bg-card) !important;
}

/* ============================================================
   AMIS / RECHERCHE
   ============================================================ */
[data-theme="dark"] .friends-text-container,
[data-theme="dark"] .friends-btn {
    background-color: var(--btn-bg) !important;
    border-color: var(--border) !important;
    color: var(--text) !important;
}
[data-theme="dark"] .friends-btn:hover {
    background-color: var(--btn-hover) !important;
}
[data-theme="dark"] .profile-link,
[data-theme="dark"] .friends-text { color: var(--text) !important; }
[data-theme="dark"] .checkmark-icon,
[data-theme="dark"] .confirm-friend-request { color: #00ffaa !important; }
[data-theme="dark"] .cancel-icon,
[data-theme="dark"] .decline-friend-request { color: #ff4da6 !important; }

/* ============================================================
   HIGHLIGHT.JS DARK MODE
   ============================================================ */
[data-theme="dark"] .hljs {
    background: #060810;
    border: 1px solid var(--border);
    border-radius: 8px;
}

/* ============================================================
   ANIMATIONS GLOBALES
   ============================================================ */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}
@keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(0,207,255,.3); }
    50%       { box-shadow: 0 0 20px rgba(0,207,255,.6); }
}
@keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position:  200% center; }
}

.anim-fade-up   { animation: fadeInUp .4s ease both; }
.anim-fade-in   { animation: fadeIn .35s ease both; }

/* ============================================================
   BOUTONS PREMIUM
   ============================================================ */
.btn-accent {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 22px;
    font-family: var(--font-primary);
    font-weight: 700;
    padding: .5rem 1.4rem;
    cursor: pointer;
    transition: opacity .2s, transform .15s, box-shadow .2s;
}
.btn-accent:hover {
    opacity: .9;
    transform: translateY(-1px);
    box-shadow: 0 6px 24px var(--accent-glow);
}
[data-theme="dark"] .btn-accent {
    color: #000;
    box-shadow: 0 0 16px rgba(0,207,255,.25);
}

/* ============================================================
   SIDEBAR (legacy compatibility)
   ============================================================ */
[data-theme="dark"] .left .profile,
[data-theme="dark"] .left .sidebar {
    background: var(--bg-card) !important;
    color: var(--text);
}

</style>
