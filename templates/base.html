<!DOCTYPE html>
{% load static i18n %}
<html lang="fr">
<head>

    <!-- ① Anti-FOUC : appliquer le thème AVANT tout rendu -->
    <script>
        (function() {
            var t = localStorage.getItem('zoot-theme');
            document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
        })();
    </script>

    <!-- ② Bootstrap chargé EN PREMIER pour que nos overrides CSS le surchargent -->
    <link rel="stylesheet" type="text/css" href="{% static 'perso/bootstrap/css/bootstrap.min.css' %}">

    <!-- ③ Variables CSS + styles de base (après Bootstrap pour avoir priorité) -->
    {% include 'snippets/base_css.html' %}

    <!-- ④ Fonctions thème globales -->
    <script>
        function _syncThemeIcons(theme) {
            var icon = (theme === 'dark')
                ? '<span class="material-icons" style="font-size:1.2rem;line-height:1">light_mode</span>'
                : '<span class="material-icons" style="font-size:1.2rem;line-height:1">dark_mode</span>';
            ['theme-toggle-btn', 'theme-toggle-btn-mobile'].forEach(function(id) {
                var el = document.getElementById(id);
                if (el) el.innerHTML = icon;
            });
        }

        function toggleTheme() {
            var html = document.documentElement;
            var next = (html.getAttribute('data-theme') === 'dark') ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            try { localStorage.setItem('zoot-theme', next); } catch(e) {}
            _syncThemeIcons(next);
        }

        document.addEventListener('DOMContentLoaded', function() {
            _syncThemeIcons(document.documentElement.getAttribute('data-theme') || 'light');
        });
    </script>

    <!-- CSS librairies -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/10.2.0/styles/default.min.css" crossorigin="anonymous" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/python.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

</head>

<!--   ---------BODY -------------------->
<div class="container" id="id_loading_spinner" style="display: none;">

			<span class="sr-only">Loading ...</span>

</div>

		}
	</style>


	<main>
		{% block content %}

	{% include 'snippets/footer.html' %}

    <!-- ── Détection automatique de langue par géolocalisation IP ──────── -->
    <!-- Appelé UNE SEULE FOIS si aucune préférence n'est déjà enregistrée  -->
    {% get_current_language as ZOOT_LANG %}
    <script>
    (function() {
        // Mapping pays → code langue supporté par le site
        var COUNTRY_LANG = {
            // Madagascar → Malagasy
            'MG': 'mg',
            // Pays francophones principaux → Français
            'FR':'fr','BE':'fr','CH':'fr','LU':'fr','MC':'fr',
            'SN':'fr','CI':'fr','ML':'fr','BF':'fr','CM':'fr',
            'TG':'fr','BJ':'fr','NE':'fr','GN':'fr','GA':'fr',
            'CD':'fr','CG':'fr','RW':'fr','BI':'fr','DJ':'fr',
            'HT':'fr','MU':'fr','SC':'fr','KM':'fr',
            // Tout le reste → Anglais (défaut)
        };
        var DEFAULT_LANG = 'en';

        // Si une langue a déjà été choisie manuellement par l'utilisateur,
        // on ne touche à rien (respect du choix explicite)
        var cookieLang = (document.cookie.match(/zoot_language=([^;]+)/) || [])[1];
        if (cookieLang) return;

        // Appel à l'API de géolocalisation IP (gratuit, sans clé, non-commercial)
        fetch('https://ip-api.com/json/?fields=countryCode', {cache:'no-cache'})
            .then(function(r){ return r.json(); })
            .then(function(data) {
                var detected = COUNTRY_LANG[data.countryCode] || DEFAULT_LANG;
                var current  = '{{ ZOOT_LANG }}';
                // Ne rien faire si la langue détectée == langue active
                if (detected === current) return;
                // Appliquer via la vue Django set_language
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = '{% url "set_language" %}';
                form.style.display = 'none';
                var csrfInput = document.createElement('input');
                csrfInput.name = 'csrfmiddlewaretoken';
                csrfInput.value = '{{ csrf_token }}';
                var langInput = document.createElement('input');
                langInput.name = 'language';
                langInput.value = detected;
                var nextInput = document.createElement('input');
                nextInput.name = 'next';
                nextInput.value = window.location.pathname;
                form.appendChild(csrfInput);
                form.appendChild(langInput);
                form.appendChild(nextInput);
                document.body.appendChild(form);
                form.submit();
            })
            .catch(function(){/* silencieux — pas de langue forcée si l'API échoue */});
    })();
    </script>

    <!-- Bootstrap JS (une seule fois, déjà jQuery en <head>) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>

    <!-- Semantic UI (gardé pour compatibilité, mais chargé APRÈS Bootstrap) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.js"></script>

    <!-- Cropper.js -->
    <script src="{% static 'cropperjs/dist/cropper.min.js' %}"></script>

    <script type="text/javascript">
        function displayLoadingSpinner(isDisplayed){
            var spinner = document.getElementById("id_loading_spinner");
            if(isDisplayed){ spinner.style.display = "block"; }
            else { spinner.style.display = "none"; }
        }
    </script>
